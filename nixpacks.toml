[phases.install]
cmds = [
  "cd backend && npm install --production=false",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && node node_modules/vite/bin/vite.js build",
  "cd backend && PUPPETEER_CACHE_DIR=/app/backend/.chromium npx puppeteer browsers install chrome"
]

[start]
cmd = "PUPPETEER_CACHE_DIR=/app/backend/.chromium node backend/server.js"
