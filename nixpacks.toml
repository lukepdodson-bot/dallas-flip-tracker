# nixpacks.toml is kept as fallback, but railway.json uses DOCKERFILE builder.
# The Dockerfile (node:20-slim + apt chromium) is the primary build config.

[phases.install]
cmds = [
  "cd backend && npm install --production=false",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && node node_modules/vite/bin/vite.js build"
]

[start]
cmd = "node backend/server.js"
