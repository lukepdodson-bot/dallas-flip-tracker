[phases.setup]
nixPkgs = ["chromium", "nss", "alsa-lib", "mesa"]

[phases.install]
cmds = [
  "cd backend && npm install --production=false",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && node node_modules/vite/bin/vite.js build",
  "which chromium && echo 'nixpkgs chromium OK' || echo 'chromium NOT in PATH'"
]

[start]
cmd = "node backend/server.js"
